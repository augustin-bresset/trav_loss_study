data:
  train_dir: /mnt/vault-fellowship/goose/GOOSE_3D/train
  val_dir:   /mnt/vault-fellowship/goose/GOOSE_3D/val
  voxel_size: 0.1     # metres
  max_rad: 50.0       # range filter in metres
  min_pos: 1          # skip scans with no positive points

model:
  in_channels: 4      # x, y, z, intensity
  cr: 1.0             # channel-width multiplier

training:
  epochs: 10
  batch_size: 2       # GOOSE scans are ~140k voxels each
  lr: 0.001
  num_workers: 4
  device: cuda

loss:
  name: bce           # bce | focal | upu | nnpu

  # focal
  gamma: 2.0
  pos_weight: 3.6     # ~1 / 0.28 (measured positive ratio on GOOSE)

  # upu / nnpu
  prior: 0.50         # ~50% of voxels are traversable in GOOSE-3D train (voxel-level measure)
  beta: 0.0           # nnpu floor

logging:
  log_dir:  data/logs/goose/
  save_dir: data/checkpoints/goose/
  exp_name: bce_run
