data:
  root: /mnt/vault-fellowship/tartan/
  voxel_size: 0.1       # metres
  max_rad: 50.0          # same filter used during trav_label preprocessing
  train_frac: 0.8        # fraction of sequences for training
  max_sequences: 10      # cap total sequences before split (null = all 55)

model:
  in_channels: 4         # x, y, z, intensity
  cr: 1.0                # channel-width multiplier (0.5 for lightweight run)

training:
  epochs: 20
  batch_size: 4
  lr: 0.001
  weight_decay: 0.0001  # AdamW regularisation
  num_workers: 4
  device: cuda

loss:
  name: nnpu             # bce | focal | upu | nnpu | tversky | lovasz | focal_nnpu | asl

  # focal / bce
  gamma: 2.0
  pos_weight: 5.0        # ~1/pos_ratio

  # upu / nnpu / focal_nnpu
  prior: 0.30            # lower than 0.5 → better precision-recall balance (study1 result)
  beta: 0.0              # nnpu floor (default 0)

  # tversky
  tversky_alpha: 0.3     # FP weight
  tversky_beta:  0.7     # FN weight

  # asl
  gamma_pos: 0.0
  gamma_neg: 4.0
  asl_clip:  0.05

logging:
  log_dir: data/logs/trav/
  save_dir: data/checkpoints/trav/
  exp_name: bce_run      # override per experiment: focal_run, upu_run, nnpu_run
