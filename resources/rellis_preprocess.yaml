data:
  root: /home/abresset/data/rellis

# RELLIS semantic IDs treated as traversable
traversable_ids:
  - 1   # dirt
  - 3   # grass
  - 10  # asphalt
  - 23  # concrete
  - 31  # puddle
  - 33  # mud

# Robot footprint for trajectory-based GT labelling
robot:
  radius:     1.0   # half-width in XY (metres)
  height_min: -5.0   # lowest point relative to robot centre (metres)
  height_max:  0.5   # highest point (metres)

# Forward lookahead for trajectory-based labelling
labeler:
  forward_window:   # number of future poses to look ahead (null = entire trajectory)
