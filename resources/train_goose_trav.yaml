data:
  root:       /mnt/vault-fellowship/goose/GOOSE_3D   # GOOSE_3D root (train/ val/ test/)
  voxel_size: 0.1      # metres
  max_rad:    50.0     # same filter used during preprocessing
  min_pos:    1        # skip scans with no positive (traversable) voxels

model:
  in_channels: 4       # x, y, z, intensity
  cr: 1.0              # channel-width multiplier (0.5 for lightweight run)

training:
  epochs:       20
  batch_size:   4       # GOOSE scans are large (~100-200 k voxels); reduce to 2 if OOM
  lr:           0.001
  weight_decay: 0.0001  # AdamW regularisation
  num_workers:  4
  device:       cuda

loss:
  name: nnpu           # bce | focal | upu | nnpu | tversky | lovasz | focal_nnpu | asl

  # focal / bce
  gamma:      2.0
  pos_weight: 3.6      # ~1 / positive_ratio

  # upu / nnpu / focal_nnpu
  prior: 0.30          # lower than 0.5 → better precision-recall balance (study1 result)
  beta:  0.0           # nnpu gradient floor

  # tversky
  tversky_alpha: 0.3   # FP weight
  tversky_beta:  0.7   # FN weight (higher = more recall-oriented)

  # asl
  gamma_pos: 0.0
  gamma_neg: 4.0
  asl_clip:  0.05

logging:
  log_dir:  data/logs/goose_trav/
  save_dir: data/checkpoints/goose_trav/
  exp_name: bce_run
